<!doctype html>
<html lang="en">
    <head>
        <title>Verifik AI</title>
        <meta charset="utf-8" />
        <meta
            name="description"
            content="Verifik AI — x402 KYC & KYB for autonomous agents, with deep LATAM coverage: national IDs, companies, vehicles, sanctions, and regional registries. Pay per validation, no subscription lock-in."
        />
        <meta
            name="keywords"
            content="Verifik, Verifik AI, x402, x402 KYC, LATAM, Latin America, KYC, KYB, identity verification, AML, sanctions, vehicle verification, Smart Agent, Blockchain, Avalanche, autonomous agents"
        />
        <meta name="author" content="Verifik" />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0"
        />

        <!-- Prevent Caching -->
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Verifik AI | x402 KYC & LATAM validations" />
        <meta
            property="og:description"
            content="x402-native KYC and KYB: broad LATAM coverage for IDs, businesses, vehicles, and watchlists—built for AI agents, priced per check."
        />
        <meta property="og:image" content="https://cdn.verifik.co/LogoNegroSolo.svg" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:title" content="Verifik AI" />
        <meta
            property="twitter:description"
            content="x402 KYC & KYB with deep LATAM coverage—IDs, companies, vehicles, sanctions. Pay per validation for agents."
        />
        <meta property="twitter:image" content="https://cdn.verifik.co/LogoNegroSolo.svg" />

        <base href="/" />

        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="favicon.svg?v=20241208" />
        <link rel="alternate icon" type="image/svg+xml" href="favicon.ico?v=20241208" />
        <link rel="shortcut icon" href="favicon.ico?v=20241208" />
        <link rel="apple-touch-icon" href="favicon.svg?v=20241208" />

        <!-- Fonts -->
        <link href="https://fonts.gstatic.com" rel="preconnect" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
            rel="stylesheet"
        />

        <!-- Icon fonts -->
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    </head>

    <body>
        <!-- Splash screen -->
        <fuse-splash-screen>
            <div class="spinner">
                <div class="bounce1"></div>
                <div class="bounce2"></div>
                <div class="bounce3"></div>
            </div>
        </fuse-splash-screen>

        <!-- App root -->
        <app-root></app-root>
    </body>
</html>
