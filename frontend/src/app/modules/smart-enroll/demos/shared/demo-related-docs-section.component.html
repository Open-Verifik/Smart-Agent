<section
    class="mt-12 rounded-2xl border border-outline-variant/20 bg-surface-container-low/35 p-6 md:p-8"
    aria-labelledby="related-docs-heading"
>
    <div class="mb-6 flex flex-col gap-1 sm:flex-row sm:items-end sm:justify-between">
        <div class="flex items-center gap-2.5">
            <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-primary/10 text-primary">
                <span class="material-symbols-outlined text-[22px]">menu_book</span>
            </span>
            <div>
                <h3 id="related-docs-heading" class="text-lg font-black tracking-tight text-on-surface">
                    {{ 'smartEnrollDemos.common.relatedDocsTitle' | transloco }}
                </h3>
                <p class="text-xs text-on-surface-variant mt-0.5">
                    {{ 'smartEnrollDemos.common.relatedDocsSubtitle' | transloco }}
                </p>
            </div>
        </div>
    </div>

    <div class="grid gap-3 sm:grid-cols-2">
        @for (doc of items; track doc.href) {
            <a
                [href]="doc.href"
                target="_blank"
                rel="noopener noreferrer"
                class="group flex flex-col rounded-xl border border-outline-variant/25 bg-surface-container/60 px-4 py-3.5 text-left shadow-sm transition-all hover:border-primary/35 hover:bg-surface-container-low/80 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/45"
            >
                <div class="mb-2 flex items-start justify-between gap-2">
                    <span
                        class="inline-flex shrink-0 items-center rounded-md border px-2 py-0.5 font-mono text-[0.625rem] font-bold uppercase tracking-wide tabular-nums"
                        [class]="
                            doc.badgeMuted
                                ? 'border-outline-variant/35 bg-surface-container-high/40 text-on-surface-variant'
                                : 'border-primary/25 bg-primary/8 text-primary'
                        "
                    >
                        {{ doc.badge }}
                    </span>
                    <span
                        class="material-symbols-outlined shrink-0 text-lg text-on-surface-variant/70 transition-colors group-hover:text-primary"
                        aria-hidden="true"
                    >
                        open_in_new
                    </span>
                </div>
                <p class="font-bold text-sm text-on-surface group-hover:text-primary transition-colors">{{ doc.title }}</p>
                <p class="mt-1 text-xs leading-relaxed text-on-surface-variant">{{ doc.description }}</p>
            </a>
        }
    </div>
</section>
