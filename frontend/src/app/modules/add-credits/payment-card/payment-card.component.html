<div
    class="group flex items-center gap-3 rounded-xl border px-4 py-3 transition"
    [ngClass]="{
        'cursor-pointer border-indigo-400 bg-indigo-50/50 ring-2 ring-indigo-500/20 dark:border-indigo-400 dark:bg-indigo-950/20 dark:ring-indigo-400/20':
            isDefault && !isExpired(card.expires_at),
        'border-stone-200 bg-white hover:border-stone-300 dark:border-gray-700 dark:bg-gray-950/50 dark:hover:border-gray-600':
            !isDefault && !isExpired(card.expires_at),
        'border-red-200 bg-red-50/50 dark:border-red-900/60 dark:bg-red-950/20': isExpired(card.expires_at),
    }"
    [attr.role]="!isDefault && !isExpired(card.expires_at) ? 'button' : null"
    [attr.tabindex]="!isDefault && !isExpired(card.expires_at) ? 0 : null"
    (click)="onRowClick($event)"
    (keydown.enter)="onRowKeydown($event)"
    (keydown.space)="onRowKeydown($event)"
>
    <!-- Brand logo -->
    <div
        class="flex h-10 w-[4.75rem] shrink-0 items-center justify-center rounded-md border border-stone-200 bg-white px-2 dark:border-gray-600 dark:bg-gray-900"
    >
        <img
            [src]="getCardLogo(card.brand)"
            [alt]="card.brand"
            class="max-h-[1.125rem] w-auto max-w-full object-contain"
        />
    </div>

    <!-- Card details -->
    <div class="min-w-0 flex-1">
        <div class="flex flex-wrap items-center gap-2">
            <span class="truncate font-medium tabular-nums text-stone-900 dark:text-stone-100">
                •••• {{ card.lastFour }}
            </span>
            <span
                *ngIf="isExpired(card.expires_at)"
                class="inline-flex shrink-0 items-center gap-1 rounded-md bg-red-100 px-2 py-0.5 text-[11px] font-semibold uppercase tracking-wide text-red-700 dark:bg-red-950/40 dark:text-red-400"
            >
                <mat-icon class="!h-3 !w-3 !text-[12px]">warning</mat-icon>
                {{ 'addCredits.paymentMethods.cardExpired' | transloco }}
            </span>
        </div>
        <p class="mt-0.5 truncate text-xs text-stone-500 dark:text-stone-400">
            {{ card.name }}
            <span class="text-stone-400 dark:text-stone-500">·</span>
            {{ 'addCredits.paymentMethods.expires' | transloco }} {{ card.expires_at }}
        </p>
    </div>

    <!-- Actions -->
    <div class="flex shrink-0 items-center gap-1">
        <span
            *ngIf="isDefault && !isExpired(card.expires_at)"
            class="rounded-md bg-emerald-50 px-2 py-0.5 text-[11px] font-semibold uppercase tracking-wide text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400"
        >
            {{ 'addCredits.paymentMethods.cardDefault' | transloco }}
        </span>

        <button
            *ngIf="!isDefault && !isExpired(card.expires_at)"
            type="button"
            class="hidden min-h-8 items-center rounded-lg px-2.5 text-xs font-medium text-indigo-600 transition hover:bg-indigo-50 sm:inline-flex dark:text-indigo-400 dark:hover:bg-indigo-950/40"
            (click)="onSetDefaultClick($event)"
        >
            {{ 'addCredits.paymentMethods.setDefault' | transloco }}
        </button>

        <button
            type="button"
            class="inline-flex min-h-8 min-w-8 items-center justify-center rounded-lg text-stone-400 transition hover:bg-stone-100 hover:text-red-600 disabled:cursor-not-allowed disabled:opacity-30 disabled:hover:bg-transparent disabled:hover:text-stone-400 dark:text-stone-500 dark:hover:bg-gray-800 dark:hover:text-red-400 dark:disabled:hover:bg-transparent dark:disabled:hover:text-stone-500"
            (click)="onDeleteClick($event)"
            [disabled]="isDefault"
            [matTooltip]="'addCredits.paymentMethods.deleteCard' | transloco"
            matTooltipPosition="above"
        >
            <mat-icon class="!h-[18px] !w-[18px] !text-[18px]">delete_outline</mat-icon>
        </button>
    </div>
</div>
