@for (banner of banners(); track trackById($index, banner)) {
    <section
        class="home-notification-banner mb-6 flex flex-col gap-3 rounded-2xl border border-teal-200/80 bg-gradient-to-br from-teal-50 via-white to-cyan-50/70 px-5 py-4 dark:border-teal-900/50 dark:from-teal-950/40 dark:via-gray-950 dark:to-gray-950 sm:flex-row sm:items-start sm:justify-between"
    >
        <div class="min-w-0 flex-1">
            <h2 class="text-base font-semibold text-teal-950 dark:text-teal-50">
                {{ banner.content.title }}
            </h2>
            @if (banner.content.summary) {
                <p class="mt-1 text-sm text-teal-900/90 dark:text-teal-100/90">
                    {{ banner.content.summary }}
                </p>
            }
        </div>
        <div class="flex shrink-0 flex-wrap items-center gap-2">
            @if (banner.cta?.url) {
                <button mat-stroked-button color="primary" type="button" (click)="openCta(banner)">
                    {{ banner.cta.label || ('appNotifications.inbox.ctaDefault' | transloco) }}
                </button>
            }
            <button
                mat-icon-button
                type="button"
                [disabled]="dismissingId() === banner.notificationId"
                [attr.aria-label]="'appNotifications.banners.dismissAria' | transloco"
                (click)="dismissBanner(banner)"
            >
                <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
            </button>
        </div>
    </section>
}
