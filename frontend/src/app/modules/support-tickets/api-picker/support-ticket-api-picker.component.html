<div class="api-picker-root w-full" (click)="$event.stopPropagation()">
    <label class="text-default mb-2 block text-sm font-medium">{{ 'supportTickets.quickChat.createDialog.api.label' | transloco }}</label>

    <button
        type="button"
        class="border-divider hover:bg-hover bg-card text-default flex w-full min-h-14 items-center justify-between rounded-xl border px-3 py-2 text-left transition disabled:opacity-50"
        [disabled]="disabled"
        (click)="toggleMenu()"
    >
        <div class="min-w-0 flex-1">
            @if (!selected) {
                <span class="text-secondary block text-sm">{{ 'supportTickets.quickChat.createDialog.api.selectHeading' | transloco }}</span>
                <span class="text-hint mt-0.5 block text-xs">{{ 'supportTickets.quickChat.createDialog.api.selectHint' | transloco }}</span>
            } @else {
                @let sel = selected;
                <div class="flex flex-wrap items-center gap-2">
                    <span class="truncate text-sm font-semibold">{{ displayTitle(sel!) }}</span>
                    <span class="rounded-full px-2 py-px text-[10px] font-bold uppercase tracking-wide badge-pill">
                        {{ 'supportTickets.quickChat.createDialog.apiTypes.' + sel!.type | transloco }}
                    </span>
                </div>
                @let rowEp = endpointLine(sel!);
                @if (rowEp) {
                    <span class="text-secondary mt-0.5 block truncate font-mono text-xs">{{ rowEp }}</span>
                }
            }
        </div>
        <mat-icon class="text-hint shrink-0" [svgIcon]="menuOpen ? 'heroicons_outline:chevron-up' : 'heroicons_outline:chevron-down'"></mat-icon>
    </button>

    @if (menuOpen) {
        <div
            class="border-divider bg-card api-dropdown-enter shadow-lg mt-2 flex max-h-[min(520px,70vh)] flex-col overflow-hidden rounded-xl border"
        >
            <div class="border-divider border-b p-3">
                <div class="border-divider bg-default flex items-center rounded-lg border px-2">
                    <mat-icon class="text-hint mr-1 shrink-0 icon-size-5" [svgIcon]="'heroicons_outline:magnifying-glass'"></mat-icon>
                    <input
                        class="text-default placeholder:text-hint w-full min-w-0 bg-transparent py-2 text-sm outline-none"
                        autocomplete="off"
                        [placeholder]="'supportTickets.quickChat.createDialog.api.searchPlaceholder' | transloco"
                        [ngModel]="searchTerm"
                        (ngModelChange)="onSearchInput($event)"
                    />
                    @if (searchTerm) {
                        <button type="button" class="text-hint p-1" [attr.aria-label]="'supportTickets.quickChat.createDialog.api.clearSearch' | transloco" (click)="clearSearch()">
                            <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
                        </button>
                    }
                </div>

                <div class="mt-3 flex flex-wrap gap-2">
                    @for (t of apiTypes; track t.value) {
                        <button
                            type="button"
                            class="filter-chip-chip inline-flex items-center gap-1 rounded-full border px-3 py-1.5 text-xs font-medium leading-none transition"
                            [class.filter-chip-active]="chipActive(t.value)"
                            [ngClass]="badgeClass(t.value)"
                            (click)="toggleTypeFilter(t.value)"
                        >
                            <mat-icon class="chip-type-icon shrink-0 opacity-80 icon-size-4" [svgIcon]="chipIconSvg(t.value)"></mat-icon>
                            <span class="truncate">{{ t.labelKey | transloco }}</span>
                            @if (chipActive(t.value)) {
                                <mat-icon class="chip-type-icon shrink-0 opacity-80 icon-size-4" [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
                            }
                        </button>
                    }
                </div>
            </div>

            <div class="border-divider text-secondary px-3 py-2 border-b text-xs">
                {{
                    ('supportTickets.quickChat.createDialog.api.apisFound' | transloco: { count: filteredApis.length })
                }}
            </div>

            <div class="min-h-0 flex-1 overflow-y-auto overscroll-contain">
                @for (api of filteredApis; track trackByApiValue($index, api)) {
                    <button
                        type="button"
                        class="hover:bg-hover border-divider flex w-full items-start gap-3 border-b px-3 py-3 text-left transition last:border-b-0"
                        [ngClass]="{
                            'api-list-row-selected': selected && selected!.value === api.value,
                        }"
                        (click)="selectApi(api)"
                    >
                        <div class="rounded-lg p-2 ring-1 ring-inset ring-transparent shell" [ngClass]="badgeClass(api.type)">
                            <mat-icon class="block" [svgIcon]="chipIconSvg(api.type)" [class.opacity-70]="true"></mat-icon>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-default truncate text-sm font-semibold">{{ displayTitle(api) }}</span>
                                <span class="rounded-full px-2 py-px text-[10px] font-bold uppercase tracking-wide badge-pill-muted">
                                    {{ 'supportTickets.quickChat.createDialog.apiTypes.' + api.type | transloco }}
                                </span>
                            </div>
                            @let line = endpointLine(api);
                            @if (line) {
                                <div class="text-secondary mt-1 truncate font-mono text-xs">{{ line }}</div>
                            }
                            @if (api.country) {
                                <div class="text-secondary mt-1 flex items-center gap-1 text-xs">
                                    <mat-icon class="inline shrink-0" [svgIcon]="'heroicons_outline:globe-alt'"></mat-icon>
                                    {{ api.country }}
                                </div>
                            }
                        </div>
                    </button>
                }
            </div>
        </div>
    }
</div>
