<div
    *ngIf="isOpen && content"
    class="fixed inset-0 z-[1100] flex items-center justify-center bg-stone-950/60 p-4 backdrop-blur-sm"
    (click)="onBackdropClick($event)"
>
    <div
        class="relative flex max-h-[min(90vh,720px)] w-full max-w-lg flex-col overflow-hidden rounded-2xl border border-stone-200 bg-white shadow-xl dark:border-gray-800 dark:bg-gray-900"
        role="dialog"
        aria-modal="true"
        [attr.aria-label]="content.title"
    >
        <div class="flex items-start gap-4 border-b border-stone-200/80 p-5 dark:border-gray-800 md:p-6">
            <div
                class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl border border-stone-200 bg-stone-50 text-stone-700 dark:border-gray-800 dark:bg-gray-950 dark:text-stone-200"
            >
                <mat-icon>{{ content.icon }}</mat-icon>
            </div>
            <div class="min-w-0 flex-1">
                <h2 class="text-lg font-semibold text-stone-950 dark:text-white">
                    {{ content.title }}
                </h2>
                <p class="mt-2 text-sm leading-6 text-stone-500 dark:text-stone-400">
                    {{ content.intro }}
                </p>
            </div>
            <button
                type="button"
                class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-xl text-stone-500 transition hover:bg-stone-100 hover:text-stone-800 dark:text-stone-400 dark:hover:bg-gray-800 dark:hover:text-stone-100"
                (click)="onClose()"
                [attr.aria-label]="'settings.api_key.help_close' | transloco"
            >
                <mat-icon class="!h-5 !w-5 !text-xl">close</mat-icon>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-5 md:p-6">
            <ul class="m-0 list-none space-y-3 p-0" *ngIf="content.points?.length">
                <li
                    *ngFor="let point of content.points; let i = index"
                    class="flex gap-3 text-sm leading-6 text-stone-600 dark:text-stone-300"
                >
                    <span
                        class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-stone-100 text-xs font-semibold text-stone-700 dark:bg-gray-800 dark:text-stone-200"
                    >
                        {{ i + 1 }}
                    </span>
                    <span class="min-w-0 flex-1">{{ point }}</span>
                </li>
            </ul>

            <pre
                *ngIf="content.codeExample"
                class="mt-5 overflow-x-auto rounded-xl border border-stone-200 bg-stone-950 p-4 text-xs leading-relaxed text-stone-200 dark:border-gray-800"
            >{{ content.codeExample }}</pre>

            <p
                *ngIf="content.note"
                class="mt-5 rounded-xl border border-amber-200/90 bg-amber-50 px-4 py-3 text-sm leading-6 text-amber-950 dark:border-amber-900/60 dark:bg-amber-950/30 dark:text-amber-100"
            >
                {{ content.note }}
            </p>
        </div>

        <div
            class="flex items-center justify-end gap-3 border-t border-stone-200/80 p-5 dark:border-gray-800 md:p-6"
        >
            <a
                *ngIf="content.docsUrl"
                [href]="content.docsUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="mr-auto inline-flex min-h-10 items-center justify-center gap-2 rounded-xl border border-stone-200 px-4 text-sm font-medium text-stone-800 transition hover:bg-stone-50 dark:border-gray-700 dark:text-stone-100 dark:hover:bg-gray-800"
            >
                <span>{{ content.docsLabel }}</span>
                <mat-icon class="!h-4 !w-4 !text-base">open_in_new</mat-icon>
            </a>
            <button
                type="button"
                class="inline-flex min-h-10 items-center justify-center rounded-xl bg-stone-950 px-5 text-sm font-semibold text-white transition hover:bg-stone-800 dark:bg-white dark:text-gray-950 dark:hover:bg-stone-200"
                (click)="onClose()"
            >
                {{ 'settings.api_key.help_close' | transloco }}
            </button>
        </div>
    </div>
</div>
