<div
    class="flex flex-col items-center justify-center gap-4 rounded-2xl border border-dashed border-stone-200 bg-white px-5 py-14 text-center dark:border-gray-800 dark:bg-gray-900/70"
>
    <div
        class="flex h-12 w-12 items-center justify-center rounded-xl bg-stone-100 text-stone-500 dark:bg-gray-800 dark:text-stone-300"
    >
        <mat-icon>person_off</mat-icon>
    </div>
    <p class="max-w-sm text-sm text-stone-500 dark:text-stone-400">
        {{ hintKey | transloco }}
    </p>
    <button
        mat-flat-button
        color="primary"
        type="button"
        class="min-h-11 rounded-xl px-5"
        (click)="openAuthModal()"
    >
        {{ 'settings.connect_business_account' | transloco }}
    </button>
</div>
