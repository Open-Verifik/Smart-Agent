<div
    class="quick-chat-inner fixed bottom-0 top-0 w-full sm:w-96 lg:sticky lg:left-full lg:h-screen lg:w-16 lg:shadow"
>
    <div
        class="bg-card flex h-full w-full flex-col transition-transform duration-400 ease-drawer sm:w-96 lg:w-[50vw]"
        [ngClass]="{
            '-translate-x-full shadow sm:-translate-x-96 lg:-translate-x-[calc(100%-4rem)]':
                opened && !expanded,
            'translate-x-0': !opened || expanded,
        }"
    >
        <div class="quick-chat-header flex flex-0 items-center justify-between">
            @if (!opened) {
                <div
                    class="relative flex w-full cursor-pointer items-center justify-start"
                    (click)="toggle()"
                >
                    <div class="flex w-16 flex-0 items-center justify-center">
                        <mat-icon
                            class="icon-size-6"
                            [svgIcon]="'heroicons_outline:inbox'"
                        ></mat-icon>
                        @if (unreadCount() > 0) {
                            <span
                                class="quick-chat-rail-badge absolute left-9 top-2 flex h-4 min-w-4 items-center justify-center rounded-full bg-teal-600 px-1 text-[10px] font-bold text-white"
                                >{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span
                            >
                        }
                    </div>
                    <div class="text-secondary flex-auto text-lg font-medium">
                        {{ 'messagesHub.railTitle' | transloco }}
                    </div>
                </div>
            } @else {
                <div class="flex w-full min-w-0 flex-col gap-2 pl-1 pr-1 pt-2">
                    <div class="flex w-full min-w-0 items-center justify-between gap-1">
                        <span class="text-default ml-2 truncate text-lg font-medium">
                            {{ 'messagesHub.headerTitle' | transloco }}
                        </span>
                        <div class="flex flex-0 items-center">
                            <button
                                mat-icon-button
                                type="button"
                                (click)="toggleExpanded(); $event.stopPropagation()"
                                [attr.aria-label]="
                                    (expanded
                                        ? 'messagesHub.fullscreenExitAria'
                                        : 'messagesHub.fullscreenEnterAria'
                                    ) | transloco
                                "
                            >
                                <mat-icon
                                    [svgIcon]="
                                        expanded
                                            ? 'heroicons_outline:arrows-pointing-in'
                                            : 'heroicons_outline:arrows-pointing-out'
                                    "
                                ></mat-icon>
                            </button>
                            <button
                                mat-icon-button
                                type="button"
                                (click)="close(); $event.stopPropagation()"
                                [attr.aria-label]="'messagesHub.closeAria' | transloco"
                            >
                                <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
                            </button>
                        </div>
                    </div>
                    <div
                        class="messages-hub-tabs mx-2 mb-1 grid grid-cols-2 gap-1 rounded-lg bg-gray-100 p-1 dark:bg-gray-800"
                        role="tablist"
                    >
                        <button
                            type="button"
                            role="tab"
                            class="messages-hub-tab rounded-md px-2 py-1.5 text-xs font-semibold transition-colors"
                            [class.messages-hub-tab--active]="activeTab === 'notifications'"
                            [attr.aria-selected]="activeTab === 'notifications'"
                            (click)="setActiveTab('notifications'); $event.stopPropagation()"
                        >
                            <span class="inline-flex items-center gap-1">
                                {{ 'messagesHub.tabs.notifications' | transloco }}
                                @if (unreadCount() > 0) {
                                    <span
                                        class="rounded-full bg-teal-600 px-1.5 py-0.5 text-[10px] font-bold text-white"
                                        >{{ unreadCount() > 99 ? '99+' : unreadCount() }}</span
                                    >
                                }
                            </span>
                        </button>
                        <button
                            type="button"
                            role="tab"
                            class="messages-hub-tab rounded-md px-2 py-1.5 text-xs font-semibold transition-colors"
                            [class.messages-hub-tab--active]="activeTab === 'tickets'"
                            [attr.aria-selected]="activeTab === 'tickets'"
                            (click)="setActiveTab('tickets'); $event.stopPropagation()"
                        >
                            {{ 'messagesHub.tabs.support' | transloco }}
                        </button>
                    </div>
                </div>
            }
        </div>

        @if (opened) {
            <div
                class="border-divider grid min-h-0 min-w-0 flex-1 grid-cols-1 grid-rows-1 overflow-hidden border-t"
            >
                <!-- Both panels share one grid cell so tab switches do not destroy state or steal width -->
                <app-notification-inbox-panel
                    #notificationPanel
                    class="col-start-1 row-start-1 min-h-0 min-w-0 overflow-hidden"
                    [class.hidden]="activeTab !== 'notifications'"
                    [attr.aria-hidden]="activeTab !== 'notifications'"
                ></app-notification-inbox-panel>
                <app-support-ticket-chat-panel
                    #ticketPanel
                    class="col-start-1 row-start-1 min-h-0 min-w-0 overflow-hidden"
                    [class.hidden]="activeTab !== 'tickets'"
                    [attr.aria-hidden]="activeTab !== 'tickets'"
                ></app-support-ticket-chat-panel>
            </div>
        }
    </div>
</div>
