<!-- Loading bar -->
<fuse-loading-bar></fuse-loading-bar>

<!-- Navigation -->
<fuse-vertical-navigation
    class="classy-layout-nav bg-card border-r border-gray-200/80 shadow-none dark:border-white/10 dark:bg-gray-900 print:hidden"
    [mode]="isScreenSmall ? 'over' : 'side'"
    [name]="'mainNavigation'"
    [navigation]="navigation.default"
    [opened]="!isScreenSmall"
>
    <!-- Navigation header hook -->
    <ng-container fuseVerticalNavigationContentHeader>
        <div
            class="classy-layout-nav__header border-b border-gray-200/90 dark:border-white/10"
        >
            <!-- Stacked bands: logo never shrinks vs wallet row (fixes collapsed wordmark bug) -->
            <div class="flex w-full flex-col gap-4 px-4 pb-4 pl-6 pt-5">
                <div
                    class="classy-layout-nav__brand flex w-full shrink-0 justify-start"
                >
                    <img
                        class="h-10 w-auto max-w-full shrink-0 object-contain object-left dark:hidden"
                        src="/images/logo/logo_verifik_brand.svg"
                        alt="Verifik"
                    />
                    <img
                        class="hidden h-10 w-auto max-w-full shrink-0 object-contain object-left dark:flex"
                        src="/images/logo/logo_verifik_brand_on_dark.svg"
                        alt="Verifik"
                    />
                </div>
                <div
                    class="flex w-full min-w-0 items-center justify-center px-0.5"
                >
                    <!-- OCULTADO: notifications - Para futuras búsquedas busca: shortcuts messages notifications header -->
                    <!-- <notifications></notifications> -->
                    <user [showAvatar]="false"></user>
                </div>
            </div>
            <!-- User -->
            <div class="flex w-full flex-col items-center px-4 pb-2">
                <div class="relative h-24 w-24">
                    @if (user.avatar) {
                        <img
                            class="h-full w-full rounded-full ring-1 ring-gray-200 dark:ring-white/10"
                            [src]="user.avatar"
                            alt="User avatar"
                        />
                    }
                    @if (!user.avatar) {
                        <mat-icon
                            class="icon-size-24 text-hint"
                            [svgIcon]="'heroicons_solid:user-circle'"
                        ></mat-icon>
                    }
                </div>
                <div class="mt-6 flex w-full flex-col items-center justify-center">
                    <div
                        class="text-default w-full overflow-hidden text-ellipsis whitespace-nowrap text-center font-medium leading-normal"
                    >
                        {{ user.name }}
                    </div>
                    <div
                        class="text-secondary mt-0.5 w-full overflow-hidden text-ellipsis whitespace-nowrap text-center text-md font-medium leading-normal"
                    >
                        {{ user.email }}
                    </div>
                </div>
            </div>
        </div>
    </ng-container>
    <!-- Navigation footer hook -->
    <ng-container fuseVerticalNavigationContentFooter>
        <div
            class="mb-4 mt-2 flex h-12 flex-0 items-center justify-center px-4 text-center"
        >
            <layout-footer [compact]="true"></layout-footer>
        </div>
    </ng-container>
</fuse-vertical-navigation>

<!-- Wrapper -->
<div class="flex w-full min-w-0 flex-auto flex-col">
    <!-- Verification strip (above header, only when canRecharge is false) -->
    <account-verification-strip></account-verification-strip>

    <!-- Header -->
    <div
        class="bg-card relative z-49 flex h-16 w-full flex-0 items-center px-4 shadow md:px-6 dark:border-b dark:bg-transparent dark:shadow-none print:hidden"
    >
        <!-- Navigation toggle button -->
        <button mat-icon-button (click)="toggleNavigation('mainNavigation')">
            <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
        </button>
        <!-- Components -->
        <div class="ml-auto flex items-center space-x-0.5 pl-2 sm:space-x-2">
            <!-- Production / Sandbox toggle -->
            <production-mode-toggle></production-mode-toggle>
            <languages></languages>
            <!-- <fuse-fullscreen class="hidden md:block"></fuse-fullscreen> -->
            <!-- <search [appearance]="'bar'"></search> -->
            <!-- OCULTADO: shortcuts messages notifications - Para futuras búsquedas busca: shortcuts messages notifications header -->
            <!-- <shortcuts></shortcuts> -->
            <!-- <messages></messages> -->
            <button
                class="lg:hidden"
                mat-icon-button
                (click)="quickChat.toggle()"
            >
                <mat-icon
                    [svgIcon]="'heroicons_outline:lifebuoy'"
                ></mat-icon>
            </button>
        </div>
    </div>

    <!-- Sandbox notice strip (below header, only when sandboxMode is true) -->
    <sandbox-notice-strip></sandbox-notice-strip>

    <!-- Content -->
    <div class="flex min-h-0 min-w-0 flex-auto flex-col overflow-hidden">
        <!-- *ngIf="true" hack is required here for router-outlet to work correctly.
             Otherwise, layout changes won't be registered and the view won't be updated! -->
        @if (true) {
            <router-outlet></router-outlet>
        }
    </div>

    <!-- Footer -->
    <div
        class="bg-card relative z-49 flex min-h-14 h-auto w-full flex-0 items-center justify-start border-t px-4 py-2 md:px-6 dark:bg-transparent print:hidden"
    >
        <layout-footer></layout-footer>
    </div>
</div>

<!-- Quick chat -->
<app-blocking-notification-modal-host></app-blocking-notification-modal-host>
<quick-chat #quickChat="quickChat"></quick-chat>
