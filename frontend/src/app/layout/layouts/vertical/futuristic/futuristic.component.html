<!-- Loading bar -->
<fuse-loading-bar></fuse-loading-bar>

<!-- Navigation (scheme follows body.light / body.dark; no forced `.dark` on host) -->
<fuse-vertical-navigation
    class="futuristic-layout-nav bg-card border-r border-gray-200/90 text-default shadow-none dark:border-white/10 dark:bg-gray-950 print:hidden"
    [mode]="isScreenSmall ? 'over' : 'side'"
    [name]="'mainNavigation'"
    [navigation]="navigation.futuristic"
    [opened]="!isScreenSmall"
>
    <!-- Navigation header hook -->
    <ng-container fuseVerticalNavigationHeader>
        <div
            class="flex h-20 items-center border-b border-gray-200/80 px-6 pb-4 pt-6 dark:border-white/10"
        >
            <img
                class="h-9 w-auto max-w-full shrink-0 object-contain object-left dark:hidden"
                src="/images/logo/logo_verifik_brand.svg"
                alt="Verifik"
            />
            <img
                class="hidden h-9 w-auto max-w-full shrink-0 object-contain object-left dark:flex"
                src="/images/logo/logo_verifik_brand_on_dark.svg"
                alt="Verifik"
            />
        </div>
    </ng-container>
    <!-- Navigation footer hook -->
    <ng-container fuseVerticalNavigationFooter>
        <div
            class="flex w-full items-center gap-4 border-t border-gray-200/80 px-6 py-6 dark:border-white/10"
        >
            <user></user>
            <div class="ml-2 flex min-w-0 flex-1 flex-col overflow-hidden">
                <div
                    class="text-default w-full overflow-hidden text-ellipsis whitespace-nowrap leading-normal font-medium"
                >
                    {{ user?.name }}
                </div>
                <div
                    class="text-secondary mt-1 w-full overflow-hidden text-ellipsis whitespace-nowrap text-sm leading-normal"
                >
                    {{ user?.email }}
                </div>
            </div>
        </div>
    </ng-container>
</fuse-vertical-navigation>

<!-- Wrapper -->
<div class="flex w-full min-w-0 flex-auto flex-col">
    <!-- Verification strip (above header, only when canRecharge is false) -->
    <account-verification-strip></account-verification-strip>

    <!-- Header -->
    <div
        class="bg-card relative z-49 flex h-16 w-full flex-0 items-center px-4 shadow md:px-6 dark:border-b dark:bg-transparent dark:shadow-none print:hidden"
    >
        <!-- Navigation toggle button -->
        <button class="mr-2" mat-icon-button (click)="toggleNavigation('mainNavigation')">
            <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
        </button>
        <!-- Components -->
        <div class="ml-auto flex items-center space-x-0.5 pl-2 sm:space-x-2">
            <production-mode-toggle></production-mode-toggle>
            <languages></languages>
            <!-- <fuse-fullscreen class="hidden md:block"></fuse-fullscreen> -->
            <!-- <search [appearance]="'bar'"></search> -->
            <!-- OCULTADO: shortcuts messages notifications - Para futuras búsquedas busca: shortcuts messages notifications header -->
            <!-- <shortcuts></shortcuts> -->
            <!-- <messages></messages> -->
            <!-- <notifications></notifications> -->
            <button class="lg:hidden" mat-icon-button (click)="quickChat.toggle()">
                <mat-icon [svgIcon]="'heroicons_outline:lifebuoy'"></mat-icon>
            </button>
        </div>
    </div>

    <!-- Sandbox notice strip (below header, only when sandboxMode is true) -->
    <sandbox-notice-strip></sandbox-notice-strip>

    <!-- Content -->
    <div class="flex flex-auto flex-col">
        <!-- *ngIf="true" hack is required here for router-outlet to work correctly.
             Otherwise, layout changes won't be registered and the view won't be updated! -->
        @if (true) {
            <router-outlet></router-outlet>
        }
    </div>

    <!-- Footer -->
    <div
        class="bg-card relative z-49 flex h-14 w-full flex-0 items-center justify-start border-t px-4 md:px-6 dark:bg-transparent print:hidden"
    >
        <layout-footer></layout-footer>
    </div>
</div>

<!-- Quick chat -->
<quick-chat #quickChat="quickChat"></quick-chat>
